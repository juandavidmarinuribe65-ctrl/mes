<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Laura ❤️ Juan</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

<audio id="bgMusic" loop>
  <source src="music/cancion.mp3" type="audio/mp3">
</audio>

<div class="tap-text">
  toca la pantalla ✨
</div>

<!-- PORTADA -->
<section class="screen active">

  <div class="card portada">

    <h2>Feliz Mesiversario</h2>

    <h1>Laura ❤️ Juan</h1>

    <p>
      29 • Octubre • 2025
    </p>

    <div class="heart">
      ❤
    </div>

  </div>

</section>

<!-- CALENDARIO -->
<section class="screen">

  <div class="card">

    <h2>
      Nuestra Historia ❤️
    </h2>

    <div class="calendar">

      <div class="special">
        29 Octubre 2025 ❤️
      </div>

      <div class="special big">
        29 Abril 2026 — 6 Meses 💖
      </div>

    </div>

    <div class="counter">

      <div>
        <span id="months">0</span>
        <p>Meses</p>
      </div>

      <div>
        <span id="days">0</span>
        <p>Días</p>
      </div>

      <div>
        <span id="hours">0</span>
        <p>Horas</p>
      </div>

      <div>
        <span id="minutes">0</span>
        <p>Minutos</p>
      </div>

      <div>
        <span id="seconds">0</span>
        <p>Segundos</p>
      </div>

    </div>

  </div>

</section>

<!-- CARTA -->
<section class="screen">

  <div class="letter-container">

    <div class="envelope"></div>

    <div class="letter">

      <h2>
        Para Laura ❤️
      </h2>

      <p>

        ESCRIBE AQUÍ TU CARTA

      </p>

    </div>

  </div>

</section>

<!-- RECUERDOS -->
<section class="screen">

  <div class="memories-container">

    <h2>
      Nuestros Recuerdos ✨
    </h2>

    <div class="memory-frame">

      <img class="memory active-memory"
      src="media/foto1.jpeg">

      <video class="memory"
      src="media/video1.mp4"
      muted
      playsinline>
      </video>

      <img class="memory"
      src="media/foto2.jpeg">

      <video class="memory"
      src="media/video2.mp4"
      muted
      playsinline>
      </video>

      <video class="memory"
      src="media/video3.mp4"
      muted
      playsinline>
      </video>

      <video class="memory"
      src="media/video4.mp4"
      muted
      playsinline>
      </video>

      <video class="memory"
      src="media/video5.mp4"
      muted
      playsinline>
      </video>

    </div>

  </div>

</section>

<script src="script.js"></script>

</body>
</html>
